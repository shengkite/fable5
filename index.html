<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Fable 5 指令中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .toast { transition: opacity 0.3s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div id="app" class="flex flex-col md:flex-row min-h-screen">
        <!-- Sidebar Navigation -->
        <aside class="w-full md:w-64 bg-white border-r border-gray-200 p-6 flex-shrink-0">
            <h1 class="text-xl font-bold text-indigo-700 mb-8 tracking-tight">Fable 5 指令中心</h1>
            <nav id="category-nav" class="space-y-2">
                <!-- Categories will be rendered here -->
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6 md:p-10 overflow-y-auto">
            <header class="mb-8">
                <h2 id="category-title" class="text-3xl font-bold text-gray-800">歡迎使用</h2>
                <p class="text-gray-500 mt-2">請選擇左側類別以查看相關實務指令模板</p>
            </header>
            
            <div id="prompts-container" class="grid grid-cols-1 gap-6">
                <!-- Prompts will be rendered here -->
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 bg-indigo-600 text-white px-6 py-3 rounded-xl shadow-lg opacity-0 pointer-events-none transform transition-all duration-300 translate-y-2">
        指令已複製至剪貼簿！
    </div>

    <script>
        const promptData = {
            "範例引導類": [
                { title: "Task 2: 零範例提示", desc: "App 使用者回饋情緒分析", prompt: "請將下列針對Fable 5開發之單字 App 的評論分類為:效能讚賞、功能建議或Bug回報:『這款App的自動發音與震動反饋非常流暢,但希望能增加更多詞庫選擇。』" },
                { title: "Task 5: 對比範例提示", desc: "行銷推廣文案語氣", prompt: "我要為『Fable 5 擊穿編程門檻』撰寫社群貼文。錯誤語氣:這個模型很強,不用學程式也能做App,大家快來用。正確語氣:程式開發的民主化時代已降臨! Claude Fable 5 讓物理理解與複雜編程化繁為簡,即刻實現你腦中的完美應用。請參照正確語氣,為『3D水槽流體模擬技術』撰寫推廣短文。" }
            ],
            "推理與規劃類": [
                { title: "Task 7: 思維鏈提示", desc: "3D遊戲物理邏輯規劃", prompt: "我計畫開發一款『恐龍射擊遊戲』。請一步一步 (Step-by-step) 說明遊戲規劃的推理過程：先定義坦克與砲塔的鼠標連動邏輯,再計算砲彈的拋物線物理軌跡,最後說明如何根據恐龍體型設定不同的血量與音效。" },
                { title: "Task 11: 逐步分解提示", desc: "iOS 單字練習 App 開發 SOP", prompt: "我要開發一個具備Swift UI 的單字App。請將任務拆解為4大步驟。請先詳細說明『步驟一:初始化 Xcode 專案與定義 Core Data 結構』,待我確認後,再進行下一步的卡片翻轉動畫說明。" }
            ],
            "輸出控制類": [
                { title: "Task 17: 格式控制", desc: "輸出測試報告", prompt: "請分析以下 App 自動化測試報告,並嚴格以JSON格式輸出:包含\"測試功能\"、\"耗時\"、\"通過狀態\"、\"錯誤描述\"四個欄位。" },
                { title: "Task 19: 逆向提示", desc: "黑洞視覺模擬動畫", prompt: "我希望能生成像《星際效應》中那樣擬真的黑洞視覺模擬動畫。請反推這段動畫的SVG 代碼撰寫指令與物理參數設定邏輯。" }
            ],
            "情境與角色類": [
                { title: "Task 21: 角色提示", desc: "高級軟體架構師審查", prompt: "你是一位擁有20年經驗的『高級軟體架構師』。請以最嚴謹的系統設計標準,審查以下由Fable 5生成的單字 App 代碼架構是否有擴充性問題。" }
            ],
            "品質與知識增強": [
                { title: "Task 23: 自我批評", desc: "文案品質優化", prompt: "第一步:請寫一段介紹 Fable 5如何解決網路安全威脅的推廣文案。第二步:請用『資安審核專家』的角度,批評這段文案是否過度誇大模型的安全性或忽視了護欄的限制,並修正為更專業的版本。" }
            ],
            "架構與管理類": [
                { title: "Task 31: 指令串接", desc: "自動化數據分析", prompt: "Step 1: 從Fable 5的基準測試報告中萃取出所有與GPT5.5的對比數據。Step 2:運用上述數據,為技術部落格撰寫一份500字的對比評測文章。" }
            ]
        };

        function renderCategories() {
            const nav = document.getElementById('category-nav');
            Object.keys(promptData).forEach(cat => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left px-4 py-3 rounded-lg text-gray-700 hover:bg-indigo-50 hover:text-indigo-700 transition font-medium";
                btn.textContent = cat;
                btn.onclick = () => renderPrompts(cat);
                nav.appendChild(btn);
            });
        }

        function renderPrompts(category) {
            document.getElementById('category-title').textContent = category;
            const container = document.getElementById('prompts-container');
            container.innerHTML = '';
            
            promptData[category].forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition";
                card.innerHTML = `
                    <h3 class="text-lg font-bold text-indigo-900">${item.title}</h3>
                    <p class="text-sm text-gray-500 mb-4 uppercase tracking-wide font-semibold">${item.desc}</p>
                    <div class="bg-gray-50 p-4 rounded-xl text-gray-700 text-sm mb-4 font-mono leading-relaxed border border-gray-100">
                        ${item.prompt}
                    </div>
                    <button onclick="copyToClipboard('${item.prompt.replace(/'/g, "\\'")}')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm transition">
                        複製指令
                    </button>
                `;
                container.appendChild(card);
            });
        }

        function copyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'translate-y-2');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-2'), 2000);
        }

        // Initial render
        renderCategories();
        renderPrompts("範例引導類");
    </script>
</body>
</html>
